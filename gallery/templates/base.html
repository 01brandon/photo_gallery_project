<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Photo Gallery{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #1f2937;
        --secondary: #6b7280;
        --accent: #3b82f6;
        --light: #f9fafb;
        --border: #e5e7eb;
        --success: #10b981;
        --error: #ef4444;
      }

      * {
        transition:
          background-color 0.2s,
          border-color 0.2s;
      }

      body {
        background-color: var(--light);
        color: var(--primary);
      }

      .navbar {
        background-color: white;
        border-bottom: 1px solid var(--border);
      }

      .btn-primary {
        background-color: var(--accent);
        color: white;
        padding: 0.5rem 1rem;
        border-radius: 0.375rem;
        text-decoration: none;
        display: inline-block;
        border: none;
        cursor: pointer;
        font-size: 0.875rem;
      }

      .btn-primary:hover {
        background-color: #2563eb;
      }

      .btn-secondary {
        background-color: var(--secondary);
        color: white;
        padding: 0.5rem 1rem;
        border-radius: 0.375rem;
        text-decoration: none;
        display: inline-block;
        border: none;
        cursor: pointer;
        font-size: 0.875rem;
      }

      .btn-secondary:hover {
        background-color: #4b5563;
      }

      .btn-danger {
        background-color: var(--error);
        color: white;
        padding: 0.5rem 1rem;
        border-radius: 0.375rem;
        text-decoration: none;
        display: inline-block;
        border: none;
        cursor: pointer;
        font-size: 0.875rem;
      }

      .btn-danger:hover {
        background-color: #dc2626;
      }

      .btn-success {
        background-color: var(--success);
        color: white;
        padding: 0.5rem 1rem;
        border-radius: 0.375rem;
        text-decoration: none;
        display: inline-block;
        border: none;
        cursor: pointer;
        font-size: 0.875rem;
      }

      .btn-success:hover {
        background-color: #059669;
      }

      .card {
        background-color: white;
        border: 1px solid var(--border);
        border-radius: 0.5rem;
        padding: 1.5rem;
      }

      .photo-card {
        background-color: white;
        border: 1px solid var(--border);
        border-radius: 0.5rem;
        overflow: hidden;
        transition: box-shadow 0.3s;
      }

      .photo-card:hover {
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }

      .photo-card img {
        width: 100%;
        height: 250px;
        object-fit: cover;
      }

      .photo-info {
        padding: 1rem;
      }

      .form-group {
        margin-bottom: 1rem;
      }

      .form-label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 500;
        color: var(--primary);
      }

      .form-input {
        width: 100%;
        padding: 0.5rem;
        border: 1px solid var(--border);
        border-radius: 0.375rem;
        font-size: 0.875rem;
      }

      .form-input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
      }

      .form-textarea {
        width: 100%;
        padding: 0.5rem;
        border: 1px solid var(--border);
        border-radius: 0.375rem;
        font-size: 0.875rem;
        font-family: inherit;
        resize: vertical;
      }

      .form-textarea:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
      }

      .alert {
        padding: 1rem;
        border-radius: 0.375rem;
        margin-bottom: 1rem;
      }

      .alert-success {
        background-color: #d1fae5;
        color: #065f46;
        border: 1px solid #a7f3d0;
      }

      .alert-error {
        background-color: #fee2e2;
        color: #7f1d1d;
        border: 1px solid #fecaca;
      }

      .alert-info {
        background-color: #dbeafe;
        color: #0c2340;
        border: 1px solid #bfdbfe;
      }

      .text-muted {
        color: var(--secondary);
        font-size: 0.875rem;
      }

      .text-center {
        text-align: center;
      }

      .mt-4 {
        margin-top: 1rem;
      }

      .mb-4 {
        margin-bottom: 1rem;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 1rem;
      }

      .section-title {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 1.5rem;
        color: var(--primary);
      }

      .profile-picture {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid var(--border);
      }

      .nav-link {
        color: var(--primary);
        text-decoration: none;
        padding: 0.5rem 1rem;
        border-radius: 0.375rem;
        transition: background-color 0.2s;
      }

      .nav-link:hover {
        background-color: var(--light);
      }

      .interaction-buttons {
        display: flex;
        gap: 0.5rem;
        margin-top: 1rem;
      }

      .tag-badge {
        background-color: #e0e7ff;
        color: #4f46e5;
        padding: 0.25rem 0.75rem;
        border-radius: 9999px;
        font-size: 0.75rem;
        display: inline-block;
        margin-right: 0.5rem;
        margin-bottom: 0.5rem;
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="container flex justify-between items-center py-4">
        <a href="{% url 'home' %}" class="text-xl font-bold">Photo Gallery</a>
        <div class="flex gap-4">
          {% if user.is_authenticated %}
          <a href="{% url 'home' %}" class="nav-link">Home</a>
          <a href="{% url 'upload_photo' %}" class="nav-link">Upload</a>
          <a href="{% url 'my_photos' %}" class="nav-link">My Photos</a>
          <a href="{% url 'profile' user.username %}" class="nav-link"
            >Profile</a
          >
          <a href="{% url 'logout' %}" class="nav-link">Logout</a>
          {% else %}
          <a href="{% url 'login' %}" class="nav-link">Login</a>
          <a href="{% url 'register' %}" class="nav-link">Register</a>
          {% endif %}
        </div>
      </div>
    </nav>

    <main class="container py-8">
      {% if messages %} {% for message in messages %}
      <div
        class="alert alert-{% if message.tags %}{{ message.tags }}{% else %}info{% endif %}"
      >
        {{ message }}
      </div>
      {% endfor %} {% endif %} {% block content %}{% endblock %}
    </main>

    <footer
      style="
        background-color: white;
        border-top: 1px solid var(--border);
        margin-top: 4rem;
        padding: 2rem 0;
      "
    >
      <div class="container text-center text-muted">
        <p>&copy; 2024 Photo Gallery. All rights reserved.</p>
      </div>
    </footer>
  </body>
</html>
