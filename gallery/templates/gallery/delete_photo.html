{% extends 'base.html' %}
{% block title %}Delete Photo - Photo Gallery{% endblock %}
{% block content %}
<div style="max-width: 500px; margin: 0 auto;">
    <div class="card">
        <h1 class="section-title" style="margin-top: 0; color: var(--error);">Delete Photo?</h1>
        <p style="margin-bottom: 1.5rem;">Are you sure you want to delete <strong>{{ photo.title }}</strong>? This cannot be undone.</p>
        <form method="post" style="display: inline;">
            {% csrf_token %}
            <button type="submit" class="btn-danger">Yes, Delete</button>
            <a href="{% url 'photo_detail' photo.id %}" class="btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
