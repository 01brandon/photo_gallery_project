{% extends 'base.html' %}
{% block title %}Photo Gallery{% endblock %}
{% block content %}
<div>
    <h1 class="section-title">Photo Gallery</h1>
    <div style="margin-bottom: 2rem; display: flex; gap: 1rem; flex-wrap: wrap;">
        <input type="text" id="search-box" placeholder="Search photos..." style="flex: 1; min-width: 200px; padding: 0.75rem; border: 1px solid var(--border); border-radius: 0.5rem; background: var(--bg-secondary); color: var(--text);">
    </div>
    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1.5rem;">
        {% for photo in photos %}
        <a href="{% url 'photo_detail' photo.id %}" style="text-decoration: none; color: inherit;">
            <div style="background: var(--bg-secondary); border-radius: 0.5rem; overflow: hidden; transition: transform 0.2s;">
                <img src="{{ photo.image.url }}" alt="{{ photo.title }}" style="width: 100%; height: 200px; object-fit: cover; display: block;">
                <div style="padding: 1rem;">
                    <h3 style="margin: 0 0 0.5rem 0; font-size: 1rem;">{{ photo.title }}</h3>
                    <p style="font-size: 0.875rem; color: var(--text-muted); margin: 0;">by {{ photo.user.username }}</p>
                </div>
            </div>
        </a>
        {% empty %}
        <p class="text-muted">No photos yet. <a href="{% url 'upload_photo' %}" style="color: var(--accent); text-decoration: none;">Upload one!</a></p>
        {% endfor %}
    </div>
</div>
<script>
    document.getElementById('search-box').addEventListener('input', function() {
        const query = this.value.toLowerCase();
        document.querySelectorAll('a[href*="/photo/"]').forEach(link => {
            const title = link.querySelector('h3').textContent.toLowerCase();
            link.style.display = title.includes(query) ? '' : 'none';
        });
    });
</script>
{% endblock %}
