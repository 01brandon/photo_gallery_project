{% extends 'base.html' %} {% block title %}Login - Photo Gallery{% endblock %}
{% block content %}
<div style="max-width: 500px; margin: 0 auto">
  <div class="card">
    <h1 class="section-title" style="margin-top: 0">Login</h1>

    <form method="post">
      {% csrf_token %}

      <div class="form-group">
        <label for="id_username" class="form-label">Username</label>
        <input
          type="text"
          name="username"
          id="id_username"
          class="form-input"
          required
        />
      </div>

      <div class="form-group">
        <label for="id_password" class="form-label">Password</label>
        <input
          type="password"
          name="password"
          id="id_password"
          class="form-input"
          required
        />
      </div>

      <button
        type="submit"
        class="btn-primary"
        style="width: 100%; text-align: center"
      >
        Login
      </button>
    </form>

    <p class="text-muted" style="margin-top: 1.5rem">
      Don't have an account?
      <a
        href="{% url 'register' %}"
        style="text-decoration: none; color: var(--accent)"
        >Register here</a
      >
    </p>
  </div>
</div>
{% endblock %}
